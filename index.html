<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alayo Mix — Client Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000000;
    min-height: 100vh;
    font-family: "Barlow", sans-serif;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
  }

  .logo-wrap {
    text-align: center;
    margin-bottom: 2rem;
  }
  .logo-wrap img {
    width: 460px;
    max-width: 92vw;
    display: block;
    margin: 0 auto;
  }

  .section-label {
    font-family: "Barlow Condensed", sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.35em;
    color: #C9A84C;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 1.4rem;
  }

  .divider {
    width: 100%;
    max-width: 480px;
    height: 1px;
    background: #222;
    margin: 0 auto 1.8rem;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    width: 100%;
    max-width: 640px;
  }

  .card {
    background: #0a0a0a;
    border: 1px solid #2a2a2a;
    padding: 1.8rem 2rem;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, background 0.2s;
    border-radius: 2px;
  }

  .card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: #C9A84C;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover {
    border-color: #C9A84C44;
    background: #0d0d0d;
  }
  .card:hover::before { opacity: 1; }

  .card-step {
    font-family: "Barlow Condensed", sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.3em;
    color: #C9A84C;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .card-title {
    font-family: "Barlow Condensed", sans-serif;
    font-size: 1.9rem;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
    line-height: 1.1;
  }

  .card-desc {
    font-family: "Barlow", sans-serif;
    font-size: 0.92rem;
    color: #999;
    line-height: 1.5;
    font-weight: 300;
  }

  .arrow {
    color: #C9A84C;
    opacity: 0.4;
    font-size: 1.6rem;
    margin-left: 1.5rem;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.2s;
    font-weight: 300;
  }
  .card:hover .arrow { opacity: 1; transform: translateX(5px); }

  .footer {
    margin-top: 2.5rem;
    font-family: "Barlow Condensed", sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.4em;
    color: #333;
    text-align: center;
    text-transform: uppercase;
  }
</style>
</head>
